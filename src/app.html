<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#05364d" />

		<!-- Default SEO — individual pages override via <svelte:head> -->
		<meta name="description" content="Ruben Gres — Creative Technologist & AI Engineer based in France. Building tools, apps, and games with artists, studios, and educational orgs at the intersection of AI and creativity." />
		<meta name="keywords" content="creative technologist, creative technologist France, AI engineer France, generative AI, AI artist, AI games, indie game AI, art and technology, Ruben Gres" />
		<meta name="author" content="Ruben Gres" />
		<meta name="geo.region" content="FR" />
		<meta name="geo.placename" content="France" />

		<!-- Open Graph -->
		<meta property="og:type"        content="website" />
		<meta property="og:url"         content="https://rubengr.es/" />
		<meta property="og:title"       content="Ruben Gres — Creative Technologist & AI Engineer (France)" />
		<meta property="og:description" content="Creative Technologist & AI Engineer based in France. Tools, apps, and games at the intersection of AI and creativity." />
		<meta property="og:image"       content="https://rubengr.es/img/portfolio.jpg" />
		<meta property="og:locale"      content="en_US" />
		<meta property="og:locale:alternate" content="fr_FR" />

		<!-- Twitter Card -->
		<meta name="twitter:card"        content="summary_large_image" />
		<meta name="twitter:title"       content="Ruben Gres — Creative Technologist & AI Engineer (France)" />
		<meta name="twitter:description" content="Creative Technologist & AI Engineer based in France. Tools, apps, and games at the intersection of AI and creativity." />
		<meta name="twitter:image"       content="https://rubengr.es/img/portfolio.jpg" />

		<!-- Favicon -->
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" />


		<!-- Font Awesome (still used by Navbar hamburger + About page) -->
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css"
			integrity="sha512-KfkfwYDsLkIlwQp6LFnl8zNdLGxu9YAA1QvwINks4PhcElQSvqcyVLLD9aMhXd13uQjoXtEKNosOWaZqXgel0g=="
			crossorigin="anonymous"
			referrerpolicy="no-referrer"
		/>

		<!-- GoatCounter analytics -->
		<script data-goatcounter="https://rgres.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
